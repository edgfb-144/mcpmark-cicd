name: Issue Management Automation

on:
  issues:
    types: [opened, labeled]

jobs:
  issue-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Triage issue and create labels
        uses: actions/github-script@v7
        with:
          script: |
            // Create required labels if they don't exist
            const labels = [
              { name: "bug", color: "d73a4a", description: "Something isn't working" },
              { name: "enhancement", color: "a2eeef", description: "New feature or request" },
              { name: "epic", color: "0052cc", description: "Large feature requiring multiple sub-tasks" },
              { name: "maintenance", color: "fef2c0", description: "Maintenance and housekeeping tasks" },
              { name: "priority-critical", color: "b60205", description: "Critical priority issue" },
              { name: "priority-high", color: "d93f0b", description: "High priority issue" },
              { name: "priority-medium", color: "0e8a16", description: "Medium priority issue" },
              { name: "priority-low", color: "e4ea8a", description: "Low priority issue" },
              { name: "needs-triage", color: "fbca04", description: "Needs to be reviewed by maintainers" },
              { name: "needs-review", color: "1d76db", description: "Awaiting review from maintainers" },
              { name: "first-time-contributor", color: "006b75", description: "Issue created by first-time contributor" }
            ];
            
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label.name
                });
              } catch (error) {
                if (error.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: label.name,
                    color: label.color,
                    description: label.description
                  });
                } else {
                  throw error;
                }
              }
            }
            
            // Add needs-triage label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ["needs-triage"]
            });
            
            // Determine category label from title
            const title = context.payload.issue.title.toLowerCase();
            let categoryLabel = null;
            
            if (title.includes("bug")) {
              categoryLabel = "bug";
            } else if (title.includes("epic")) {
              categoryLabel = "epic";
            } else if (title.includes("maintenance")) {
              categoryLabel = "maintenance";
            }
            
            if (categoryLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [categoryLabel]
              });
            }
            
            // Determine priority label from title or body
            const body = context.payload.issue.body ? context.payload.issue.body.toLowerCase() : "";
            const content = `${title} ${body}`;
            let priorityLabel = "priority-medium"; // Default
            
            if (content.includes("critical") || content.includes("urgent") || content.includes("production") || content.includes("outage")) {
              priorityLabel = "priority-critical";
            } else if (content.includes("important") || content.includes("high") || content.includes("blocking")) {
              priorityLabel = "priority-high";
            } else if (content.includes("low") || content.includes("nice-to-have") || content.includes("minor")) {
              priorityLabel = "priority-low";
            }
            
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [priorityLabel]
            });

  task-breakdown:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: contains(github.event.issue.labels.*.name, 'epic')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Create sub-tasks for epic issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const parentNumber = issue.number;
            const originalTitle = issue.title;
            const tasks = [
              { name: "Requirements Analysis" },
              { name: "Design and Architecture" },
              { name: "Implementation" },
              { name: "Testing and Documentation" }
            ];
            
            const subIssueNumbers = [];
            
            // Create sub-issues
            for (let i = 0; i < tasks.length; i++) {
              const task = tasks[i];
              const subTitle = `[SUBTASK] ${originalTitle} - Task ${i + 1}: ${task.name}`;
              const subBody = `Related to #${parentNumber}`;
              
              const subIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: subTitle,
                body: subBody,
                labels: ["enhancement", "needs-review"]
              });
              
              subIssueNumbers.push(subIssue.data.number);
            }
            
            // Update parent issue with epic tasks checklist
            const checklist = subIssueNumbers.map(num => `- [ ] #${num}`).join("\n");
            const newBody = issue.body ? `${issue.body}\n\n## Epic Tasks\n${checklist}` : `## Epic Tasks\n${checklist}`;
            
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parentNumber,
              body: newBody
            });

  auto-response:
    runs-on: ubuntu-latest
    needs: issue-triage
    if: github.event.action == 'opened'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Auto-response and issue updates
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = issue.number;
            
            // Check if this is the author's first issue in the repo
            const userIssues = await github.rest.issues.listForRepo({
              owner: owner,
              repo: repo,
              creator: author,
              state: "all"
            });
            
            const isFirstIssue = userIssues.data.length === 1;
            
            // Add first-time-contributor label and welcome message if applicable
            if (isFirstIssue) {
              await github.rest.issues.addLabels({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                labels: ["first-time-contributor"]
              });
              
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: `Welcome @${author}! This is your first issue in this repository. We appreciate your contribution and will review your issue shortly.`
              });
            }
            
            // Get issue labels for response logic
            const issueLabels = issue.labels.map(label => label.name.toLowerCase());
            let responseMessage = "";
            
            // Determine response based on category label
            if (issueLabels.includes("bug")) {
              responseMessage = `### Bug Report Guidelines\nThank you for reporting this bug! To help us resolve this quickly, please ensure you have provided:\n1. Clear description of the bug\n2. Step-by-step reproduction instructions\n3. Expected vs actual behavior\n4. Screenshots (if applicable)\n5. Environment details (Node.js version, OS, etc.)\n\nWe'll review this bug report and follow up with you soon.`;
            } else if (issueLabels.includes("epic")) {
              responseMessage = `### Feature Request Process\nThis epic has been recognized as a large feature request. We'll break this down into manageable sub-tasks shortly. You can track the progress of this epic through the checklist that will be added to this issue body.\n\nFor more information on our feature request process, please refer to the project documentation.`;
            } else if (issueLabels.includes("maintenance")) {
              responseMessage = `### Maintenance Guidelines\nThank you for submitting this maintenance task. Our team will review the proposed tasks and ensure they align with the project's maintenance standards.\n\nPlease ensure all maintenance tasks are well-documented and follow the project's coding conventions.`;
            }
            
            // Post response message if applicable
            if (responseMessage) {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: responseMessage
              });
            }
            
            // Set milestone for high/critical priority issues
            if (issueLabels.includes("priority-high") || issueLabels.includes("priority-critical")) {
              try {
                // Check if v1.0.0 milestone exists
                const milestones = await github.rest.issues.listMilestones({
                  owner: owner,
                  repo: repo,
                  state: "open"
                });
                
                const v1Milestone = milestones.data.find(milestone => milestone.title === "v1.0.0");
                
                if (v1Milestone) {
                  // Assign existing milestone
                  await github.rest.issues.update({
                    owner: owner,
                    repo: repo,
                    issue_number: issueNumber,
                    milestone: v1Milestone.number
                  });
                } else {
                  // Create new milestone
                  const newMilestone = await github.rest.issues.createMilestone({
                    owner: owner,
                    repo: repo,
                    title: "v1.0.0",
                    description: "Version 1.0.0 release milestone"
                  });
                  
                  // Assign new milestone
                  await github.rest.issues.update({
                    owner: owner,
                    repo: repo,
                    issue_number: issueNumber,
                    milestone: newMilestone.data.number
                  });
                }
              } catch (error) {
                console.error("Error handling milestone assignment:", error);
              }
            }
            
            // Update issue status: remove needs-triage, add needs-review
            await github.rest.issues.removeLabel({
              owner: owner,
              repo: repo,
              issue_number: issueNumber,
              name: "needs-triage"
            });
            
            await github.rest.issues.addLabels({
              owner: owner,
              repo: repo,
              issue_number: issueNumber,
              labels: ["needs-review"]
            });